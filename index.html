<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Érlelő</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.png" />
    <meta name="theme-color" content="#161616" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg: #161616;
            --card: #232323;
            --border: #343434;
            --text: #f3f3f3;
            --muted: #8f8f8f;
            --accent: #52d18c;
            --temp: #f0c14b;
        }

        body {
            margin: 0;
            padding: 20px 16px;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
        }

        .container { max-width: 500px; margin: 0 auto; }

        .header { text-align: left; margin-bottom: 24px; }
        h1 { margin: 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.04em; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .main-display { display: flex; align-items: baseline; justify-content: flex-start; gap: 4px; }
        .main-num { font-size: 5rem; font-weight: 800; letter-spacing: -0.05em; line-height: 1; }
        .main-unit { font-size: 1.8rem; font-weight: 600; color: var(--muted); }

        .secondary-stats { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .stat-item { flex: 1; }
        .stat-label { font-size: 0.9rem; color: var(--muted); margin-bottom: 4px; }
        .stat-val { font-size: 1.4rem; font-weight: 700; }

        .tab-nav { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { 
            flex: 1; border: none; background: #2a2a2a; color: var(--muted); 
            padding: 12px; border-radius: 14px; font-weight: 700; cursor: pointer;
        }
        .tab-btn.active { background: var(--text); color: var(--bg); }

        .chart-panel { display: none; height: 300px; width: 100%; touch-action: none; }
        .chart-panel.active { display: block; }
        
        .reset-zoom {
            background: none; border: 1px solid var(--border); color: var(--muted);
            font-size: 0.7rem; padding: 4px 8px; border-radius: 6px; margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Érlelő</h1>
        </header>

        <section class="card">
            <div class="main-display">
                <div class="main-num" id="current-hum">--</div>
                <div class="main-unit">%</div>
            </div>
            <div class="secondary-stats">
                <div class="stat-item">
                    <div class="stat-label">HŐMÉRSÉKLET</div>
                    <div class="stat-val"><span id="current-temp">--</span> °C</div>
                </div>
            </div>
        </section>

        <section class="card">
            <div class="tab-nav">
                <button class="tab-btn active" onclick="openChart(event, 'chart1h')">1 óra</button>
                <button class="tab-btn" onclick="openChart(event, 'chart6h')">Nap</button>
            </div>

            <div id="chart1h" class="chart-panel active">
                <canvas id="humidityChart1h"></canvas>
                <button class="reset-zoom" onclick="chart1hObj.resetZoom()">Zoom visszaállítása</button>
            </div>

            <div id="chart6h" class="chart-panel">
                <canvas id="humidityChart6h"></canvas>
            </div>
        </section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA3xC8QXRpv0B4dYRYLXUAOB1yAtp5dK80",
            databaseURL: "https://kolbaszmonitor-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kolbaszmonitor",
            appId: "1:746335520628:web:e48101d8c33dc42ca78e21"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let chart1hObj;

        // 1 ÓRÁS GRAFIKON (Zoomos)
        const ctx1h = document.getElementById('humidityChart1h').getContext('2d');
        chart1hObj = new Chart(ctx1h, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Pára %', data: [], borderColor: '#52d18c', borderWidth: 2, pointRadius: 1, tension: 0.3, fill: false },
                    { label: 'Hőm °C', data: [], borderColor: '#f0c14b', borderWidth: 1.5, pointRadius: 0, tension: 0.3 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    y: { min: 0, max: 100, grid: { color: '#333' }, ticks: { color: '#666' } },
                    x: { grid: { display: false }, ticks: { color: '#666', maxTicksLimit: 5 } }
                },
                plugins: {
                    legend: { display: false },
                    zoom: {
                        pan: { enabled: true, mode: 'x' },
                        zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' }
                    }
                }
            }
        });

        // NAPI GRAFIKON (Oszlopos - 1 órás blokkok)
        const ctx6h = document.getElementById('humidityChart6h').getContext('2d');
        const chart6hObj = new Chart(ctx6h, {
            type: 'bar',
            data: { labels: [], datasets: [{ label: 'Pára %', data: [], backgroundColor: '#52d18c', borderRadius: 4 }] },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    y: { min: 0, max: 100, grid: { color: '#333' } },
                    x: { grid: { display: false }, ticks: { color: '#666' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // ADATOK ÉLŐBEN
        db.ref('/').on('value', (s) => {
            const d = s.val(); if (!d) return;
            document.getElementById('current-hum').textContent = Math.round(d.paratartalom);
            document.getElementById('current-temp').textContent = d.homerseklet.toFixed(1);
        });

        // HISTORY FRISSÍTÉS
        db.ref('history').limitToLast(60).on('value', (s) => {
            const data = s.val(); if (!data) return;
            const h = []; const t = []; const l = [];
            for (const id in data) {
                const date = new Date(data[id].ts);
                l.push(date.getHours() + ":" + date.getMinutes().toString().padStart(2, '0'));
                h.push(data[id].h); t.push(data[id].t);
            }
            chart1hObj.data.labels = l;
            chart1hObj.data.datasets[0].data = h;
            chart1hObj.data.datasets[1].data = t;
            chart1hObj.update('none'); // Frissítés animáció nélkül a folyamatosságért
        });

        // NAPI (ÓRÁS) FRISSÍTÉS
        db.ref('history_long').limitToLast(24).on('value', (s) => {
            const data = s.val(); if (!data) return;
            const v = []; const l = [];
            for (const id in data) {
                l.push(data[id].label || ""); v.push(data[id].avgH || 0);
            }
            chart6hObj.data.labels = l;
            chart6hObj.data.datasets[0].data = v;
            chart6hObj.update();
        });

        function openChart(evt, name) {
            document.querySelectorAll('.chart-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            evt.currentTarget.classList.add('active');
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
