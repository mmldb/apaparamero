<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Érlelő</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icon.png" />
    <meta name="theme-color" content="#161616" />

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.0.1"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg: #161616;
            --card: #232323;
            --border: #343434;
            --text: #f3f3f3;
            --muted: #8f8f8f;
            --accent: #52d18c;
            --temp: #f0c14b;
        }

        body {
            margin: 0;
            padding: 20px 16px;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-user-select: none;
        }

        .container { max-width: 500px; margin: 0 auto; }

        .header { text-align: left; margin-bottom: 24px; }
        h1 { margin: 0; font-size: 2.2rem; font-weight: 800; letter-spacing: -0.04em; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .main-display { display: flex; align-items: baseline; justify-content: flex-start; gap: 4px; }
        .main-num { font-size: 5rem; font-weight: 800; letter-spacing: -0.05em; line-height: 1; }
        .main-unit { font-size: 1.8rem; font-weight: 600; color: var(--muted); }

        .secondary-stats { display: flex; gap: 20px; margin-top: 15px; border-top: 1px solid var(--border); padding-top: 15px; }
        .stat-item { flex: 1; }
        .stat-label { font-size: 0.8rem; color: var(--muted); margin-bottom: 4px; letter-spacing: 0.05em; }
        .stat-val { font-size: 1.4rem; font-weight: 700; }

        .tab-nav { display: flex; gap: 10px; margin-bottom: 15px; background: #1d1d1d; padding: 5px; border-radius: 18px; }
        .tab-btn { 
            flex: 1; border: none; background: transparent; color: var(--muted); 
            padding: 12px; border-radius: 14px; font-weight: 700; cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active { background: #3a3a3a; color: var(--text); }

        .chart-panel { display: none; height: 320px; width: 100%; touch-action: none; position: relative; }
        .chart-panel.active { display: block; }
        
        .reset-zoom {
            position: absolute; top: -10px; right: 0;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted);
            font-size: 0.7rem; padding: 4px 10px; border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Érlelő</h1>
        </header>

        <section class="card">
            <div class="main-display">
                <div class="main-num" id="current-hum">--</div>
                <div class="main-unit">%</div>
            </div>
            <div class="secondary-stats">
                <div class="stat-item">
                    <div class="stat-label">HŐMÉRSÉKLET</div>
                    <div class="stat-val"><span id="current-temp">--</span> °C</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">CÉLÉRTÉK</div>
                    <div class="stat-val">75%</div>
                </div>
            </div>
        </section>

        <section class="card">
            <div class="tab-nav">
                <button class="tab-btn active" onclick="openChart(event, 'chart1h')">1 óra</button>
                <button class="tab-btn" onclick="openChart(event, 'chartDay')">Mai nap</button>
            </div>

            <div id="chart1h" class="chart-panel active">
                <button class="reset-zoom" onclick="chart1hObj.resetZoom()">Zoom visszaállítása</button>
                <canvas id="humidityChart1h"></canvas>
            </div>

            <div id="chartDay" class="chart-panel">
                <canvas id="humidityChartDay"></canvas>
            </div>
        </section>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA3xC8QXRpv0B4dYRYLXUAOB1yAtp5dK80",
            databaseURL: "https://kolbaszmonitor-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kolbaszmonitor",
            appId: "1:746335520628:web:e48101d8c33dc42ca78e21"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let chart1hObj, chartDayObj;

        // KÖZÖS BEÁLLÍTÁS A ZÖLD SÁVHOZ
        const idealRangeAnnotation = {
            annotations: {
                idealBox: {
                    type: 'box',
                    yMin: 70,
                    yMax: 82,
                    backgroundColor: 'rgba(82, 209, 140, 0.08)',
                    borderColor: 'transparent',
                    drawTime: 'beforeDatasetsDraw'
                },
                targetLine: {
                    type: 'line',
                    yMin: 75,
                    yMax: 75,
                    borderColor: 'rgba(255, 255, 255, 0.1)',
                    borderWidth: 1,
                    borderDash: [5, 5]
                }
            }
        };

        // 1 ÓRÁS GRAFIKON
        const ctx1h = document.getElementById('humidityChart1h').getContext('2d');
        chart1hObj = new Chart(ctx1h, {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'Pára %', data: [], borderColor: '#52d18c', borderWidth: 3, pointRadius: 1, tension: 0.35, fill: false },
                    { label: 'Hőm °C', data: [], borderColor: '#f0c14b', borderWidth: 1.5, pointRadius: 0, tension: 0.35 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    y: { min: 40, max: 100, grid: { color: '#2a2a2a' }, ticks: { color: '#666' } },
                    x: { grid: { display: false }, ticks: { color: '#666', maxTicksLimit: 6 } }
                },
                plugins: {
                    legend: { display: false },
                    annotation: idealRangeAnnotation,
                    zoom: {
                        pan: { enabled: true, mode: 'x' },
                        zoom: { wheel: { enabled: true }, pinch: { enabled: true }, mode: 'x' }
                    }
                }
            }
        });

        // MAI NAP GRAFIKON (Órás bontás a history-ból)
        const ctxDay = document.getElementById('humidityChartDay').getContext('2d');
        chartDayObj = new Chart(ctxDay, {
            type: 'bar',
            data: { labels: [], datasets: [{ label: 'Átlag Pára %', data: [], backgroundColor: 'rgba(82, 209, 140, 0.6)', borderRadius: 6 }] },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    y: { min: 0, max: 100, grid: { color: '#2a2a2a' }, ticks: { color: '#666' } },
                    x: { grid: { display: false }, ticks: { color: '#666' } }
                },
                plugins: { 
                    legend: { display: false },
                    annotation: idealRangeAnnotation
                }
            }
        });

        // ÉLŐ ADATOK
        db.ref('/').on('value', (s) => {
            const d = s.val(); if (!d) return;
            document.getElementById('current-hum').textContent = Math.round(d.paratartalom);
            document.getElementById('current-temp').textContent = d.homerseklet.toFixed(1);
        });

        // HISTORY -> 1 ÓRÁS ÉS NAPI ÁTLAGOLÓ
        db.ref('history').limitToLast(1000).on('value', (s) => {
            const data = s.val(); if (!data) return;
            
            // 1. ELMÚLT 1 ÓRA (perces adatok)
            const h1 = []; const t1 = []; const l1 = [];
            const allEntries = Object.values(data);
            const last60 = allEntries.slice(-60);
            
            last60.forEach(entry => {
                const date = new Date(entry.ts);
                l1.push(date.getHours() + ":" + date.getMinutes().toString().padStart(2, '0'));
                h1.push(entry.h); t1.push(entry.t);
            });
            chart1hObj.data.labels = l1;
            chart1hObj.data.datasets[0].data = h1;
            chart1hObj.data.datasets[1].data = t1;
            chart1hObj.update('none');

            // 2. MAI NAP (Órás átlagok képzése a history-ból)
            const hourlyData = {};
            allEntries.forEach(entry => {
                const date = new Date(entry.ts);
                const hourKey = date.getHours() + ":00";
                if (!hourlyData[hourKey]) hourlyData[hourKey] = { sum: 0, count: 0 };
                hourlyData[hourKey].sum += entry.h;
                hourlyData[hourKey].count++;
            });

            const lDay = []; const vDay = [];
            Object.keys(hourlyData).forEach(hour => {
                lDay.push(hour);
                vDay.push(Math.round(hourlyData[hour].sum / hourlyData[hour].count));
            });
            chartDayObj.data.labels = lDay;
            chartDayObj.data.datasets[0].data = vDay;
            chartDayObj.update();
        });

        function openChart(evt, name) {
            document.querySelectorAll('.chart-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(name).classList.add('active');
            evt.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
