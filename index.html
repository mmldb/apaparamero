<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolbász Kontroll Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#1a1a1a">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.0.1"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 15px; padding-bottom: 30px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #2c2c2c; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.6); border: 1px solid #3d3d3d; }
        h1 { color: #e74c3c; font-size: 1.6rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }
        .value { font-size: 3.8rem; font-weight: bold; margin: 5px 0; }
        .unit { font-size: 1.1rem; color: #888; text-transform: uppercase; }
        
        #status-text { display: inline-block; padding: 6px 18px; border-radius: 50px; font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .status-ok { background: #27ae60; color: white; }
        .status-warn { background: #d35400; color: white; }
        .status-wet { background: #2980b9; color: white; }
        
        .temp-mini { margin-top: 8px; color: #aaa; font-size: 1rem; }

        /* Tabs a grafikonokhoz */
        .tab-container { display: flex; justify-content: space-around; margin-bottom: 15px; background: #222; border-radius: 10px; padding: 5px; }
        .tab-button { background: none; border: none; color: #888; padding: 10px 20px; font-size: 0.9rem; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .tab-button.active { background: #3d3d3d; color: white; }
        .chart-panel { display: none; position: relative; height: 280px; width: 100%; }
        .chart-panel.active { display: block; }
        canvas { background: #222; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🥩 Kolbász Kontroll</h1>

        <div class="card">
            <div id="status-text" class="status-ok">Csatlakozás...</div>
            <div class="value" id="current-hum">--<span class="unit">%</span></div>
            <div class="unit">Páratartalom</div>
            <div class="temp-mini">Hőmérséklet: <span id="current-temp" style="color: #eee;">--</span> °C</div>
        </div>

        <div class="card">
            <div class="tab-container">
                <button class="tab-button active" onclick="openChart(event, 'chart1h')">1 Óra (Élő)</button>
                <button class="tab-button" onclick="openChart(event, 'chart6h')">Hosszú táv (Trend)</button>
            </div>

            <div id="chart1h" class="chart-panel active">
                <div class="unit" style="font-size: 0.75rem; margin-bottom: 10px;">Páratartalom % (Zöld sáv = Optimális)</div>
                <canvas id="humidityChart1h"></canvas>
            </div>

            <div id="chart6h" class="chart-panel">
                <div class="unit" style="font-size: 0.75rem; margin-bottom: 10px;">6 órás átlagok (Heti trend)</div>
                <canvas id="humidityChart6h"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE KONFIGURÁCIÓ ---
        // A TE EGYEDI FIREBASE ADATAID (Ezt ne bántsd)
        const firebaseConfig = {
            apiKey: "AIzaSyA3xC8QXRpv0B4dYRYLXUAOB1yAtp5dK80",
            databaseURL: "https://kolbaszmonitor-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kolbaszmonitor",
            appId: "1:746335520628:web:e48101d8c33dc42ca78e21"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 2. GRAFIKONOK KÖZÖS BEÁLLÍTÁSAI ---
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
                legend: { display: false },
                annotation: {
                    annotations: {
                        box1: {
                            type: 'box',
                            yMin: 70, yMax: 82, // A biztonsági zóna határai
                            backgroundColor: 'rgba(39, 174, 96, 0.15)', // Halványzöld sáv
                            borderColor: 'transparent',
                        },
                        line1: {
                            type: 'line',
                            yMin: 75, yMax: 75,
                            borderColor: 'rgba(231, 76, 60, 0.6)', // Halványpiros szaggatott vonal az optimális közepén
                            borderWidth: 2,
                            borderDash: [6, 4],
                        }
                    }
                }
            },
            scales: {
                y: { min: 0, max: 100, grid: { color: '#333' }, ticks: { color: '#888', stepSize: 10 } },
                x: { display: false }
            }
        };

        // --- 3. GRAFIKONOK INICIALIZÁLÁSA ---
        // 1 Órás Grafikon
        const ctx1h = document.getElementById('humidityChart1h').getContext('2d');
        const chart1h = new Chart(ctx1h, {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Pára %', data: [], borderColor: '#2ecc71', backgroundColor: 'rgba(46, 204, 113, 0.1)', tension: 0.3, fill: true, pointRadius: 1 }] },
            options: commonOptions
        });

        // Hosszú távú Grafikon
        const ctx6h = document.getElementById('humidityChart6h').getContext('2d');
        const chart6h = new Chart(ctx6h, {
            type: 'bar', // A hosszú távú trendet oszlopdiagrammal jobban látni
            data: { labels: [], datasets: [{ label: '6h Átlag %', data: [], backgroundColor: '#3498db', borderRadius: 5 }] },
            options: { ...commonOptions, scales: { ...commonOptions.scales, x: { display: true, grid: { display: false }, ticks: { color: '#666', fontSize: 10 } } } }
        });

        // --- 4. ADATOK FIGYELÉSE ---
        // Élő adatok (current)
        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const h = data.paratartalom;
                const t = data.homerseklet;
                document.getElementById('current-hum').innerHTML = Math.round(h) + '<span class="unit">%</span>';
                document.getElementById('current-temp').innerText = t.toFixed(1);
                const status = document.getElementById('status-text');
                if (h < 70) { status.innerText = "⚠️ TÚL SZÁRAZ"; status.className = "status-text status-warn"; }
                else if (h > 82) { status.innerText = "💧 TÚL PÁRÁS"; status.className = "status-text status-wet"; }
                else { status.innerText = "✅ TÖKÉLETES PÁRA"; status.className = "status-text status-ok"; }
            }
        });

        // 1 Órás Történet (history ág, utolsó 60 mérés, feltételezve a percenkénti küldést)
        db.ref('history').limitToLast(60).on('value', (snapshot) => {
            updateLineChart(chart1h, snapshot.val());
        });

        // Hosszú távú trend (ÚJ 'daily_trends' ág, amit az ESP32-nek kell töltenie)
        // Az ESP32-nek 6 óránként kell ide pusholnia az átlagot.
        db.ref('daily_trends').limitToLast(14).on('value', (snapshot) => { // Utolsó 2 hét
            updateBarChart(chart6h, snapshot.val());
        });

        // --- 5. SEGÉDFUNKCIÓK ---
        function updateLineChart(chart, data) {
            const values = []; const labels = [];
            if (data) {
                for (let id in data) { labels.push(""); values.push(data[id].h); }
                chart.data.labels = labels; chart.data.datasets[0].data = values; chart.update();
            }
        }

        function updateBarChart(chart, data) {
            const values = []; const labels = [];
            if (data) {
                for (let id in data) { 
                    // Feltételezzük, hogy az ESP32 'label'-ként beküldi a nap/időpontot (pl. "Hét 12:00")
                    labels.push(data[id].label || ""); 
                    values.push(data[id].avg_h); 
                }
                chart.data.labels = labels; chart.data.datasets[0].data = values; chart.update();
            }
        }

        // Tab kezelő
        function openChart(evt, chartName) {
            const chartPanels = document.getElementsByClassName("chart-panel");
            for (let i = 0; i < chartPanels.length; i++) { chartPanels[i].classList.remove("active"); }
            const tabButtons = document.getElementsByClassName("tab-button");
            for (let i = 0; i < tabButtons.length; i++) { tabButtons[i].classList.remove("active"); }
            document.getElementById(chartName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // PWA Service Worker
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
