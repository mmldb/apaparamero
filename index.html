<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kolbász Érlelő Monitor</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #2c3e50; color: white; text-align: center; padding: 20px; }
        .card { background: #34495e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.3); margin-bottom: 20px; }
        .value { font-size: 3em; font-weight: bold; margin: 10px 0; }
        .unit { font-size: 0.5em; color: #bdc3c7; }
        .status { padding: 10px; border-radius: 5px; font-weight: bold; margin-top: 10px; }
        .ok { background: #27ae60; }
        .dry { background: #e67e22; }
        .wet { background: #2980b9; }
    </style>
</head>
<body>
    <h1>🥩 Kolbász-Kontroll</h1>
    
    <div class="card">
        <div>PÁRATARTALOM</div>
        <div class="value" id="hum">-- <span class="unit">%</span></div>
        <div id="hum-status" class="status">Betöltés...</div>
    </div>

    <div class="card">
        <div>HŐMÉRSÉKLET</div>
        <div class="value" id="temp">-- <span class="unit">°C</span></div>
    </div>

    <script>
        // IDE MÁSOLD MAJD A FIREBASE KONFIGURÁCIÓT!
        var firebaseConfig = {
            apiKey: "ADATOK_A_PROJECT_SETTINGSBOL",
            databaseURL: "ADATOK_A_DATABASE_FÜLRŐL",
            projectId: "kolbaszmonitor",
            appId: "SAJAT_APP_ID"
        };
        
        firebase.initializeApp(firebaseConfig);
        var db = firebase.database();

        // Adatok frissítése valós időben
        db.ref('/').on('value', (snapshot) => {
            const data = snapshot.val();
            document.getElementById('temp').innerHTML = data.homerseklet.toFixed(1) + '<span class="unit">°C</span>';
            document.getElementById('hum').innerHTML = data.paratartalom.toFixed(1) + '<span class="unit">%</span>';
            
            const st = document.getElementById('hum-status');
            if(data.paratartalom < 65) { st.innerText = "TÚL SZÁRAZ!"; st.className = "status dry"; }
            else if(data.paratartalom > 85) { st.innerText = "TÚL PÁRÁS!"; st.className = "status wet"; }
            else { st.innerText = "TÖKÉLETES ÁLLAPOT"; st.className = "status ok"; }
        });
    </script>
</body>
</html>
